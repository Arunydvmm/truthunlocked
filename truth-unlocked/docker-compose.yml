version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: truth-unlocked-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: truth-unlocked
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - truth-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build: .
    container_name: truth-unlocked-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/truth-unlocked?authSource=admin
      JWT_SECRET: dev-secret-key-change-in-production
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server.js:/app/server.js
      - ./uploads:/app/uploads
    networks:
      - truth-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
  mongodb_config:

networks:
  truth-network:
    driver: bridge
